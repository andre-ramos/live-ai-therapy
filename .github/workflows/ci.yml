name: CI

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Run frontend tests
        run: npm test

      - name: Run backend tests
        run: python -m pytest backend/tests -q

      - name: Validate migrations
        run: python -m alembic heads

      - name: Validate shell scripts
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          bash -n install.sh scripts/check-public-repo.sh
          find ops -type f -name '*.sh' -print0 | xargs -0 -r -n1 bash -n
          shellcheck install.sh scripts/check-public-repo.sh

      - name: Audit public repository
        run: bash scripts/check-public-repo.sh
